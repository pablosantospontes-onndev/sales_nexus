services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: vigg_nexus
      DB_USERNAME: vigg
      DB_PASSWORD: viggpass
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
  db:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vigg_nexus
      MYSQL_USER: vigg
      MYSQL_PASSWORD: viggpass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
volumes:
  db_data:
